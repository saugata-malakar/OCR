services:
  - type: web
    name: paddleocr-studio
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: OCR_ENGINE
        value: paddle
      - key: OCR_VERSION
        value: PP-OCRv4
      - key: OCR_LANG
        value: en
      - key: OCR_CPU_THREADS
        value: "1"